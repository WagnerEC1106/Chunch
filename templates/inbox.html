<!DOCTYPE HTML>
<HTML>
  <body>
    <h1>This is the inbox</h1>
     <table border="1" cellpadding="6">
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone Number</th>
        </tr>

        {% for a in applicants %}
        <tr>
            <td>{{ a.first_name }} {{ a.last_name }}</td>
            <td>{{ a.email }}</td>
            <td>{{ a.phone }}</td>
            <td>
              <form method = "POST" action = "/admin/inbox/accept/{{ a.id }}">
                <button type ="submit"
                  onclick="return confirm('Accept this applicant?')">
                  Accept
                </button>
              </form>
            </td>
            <td>
              <form method = "POST" action = "/admin/inbox/reject/{{ a.id }}">
                <button type ="submit"
                  onclick="return confirm('Reject this applicant?')">
                  Reject
                </button>
              </form>
            </td>
        </tr>
        {% endfor %}
    </table>
  </body>
</HTML>
