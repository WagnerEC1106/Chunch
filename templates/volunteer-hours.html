<!-- templates/volunteer_hours.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Volunteer Hours</title>
  <style>
    table {
      border-collapse: collapse;
      width: 80%;
      margin: 20px auto;
    }
    th, td {
      border: 1px solid #444;
      padding: 8px 12px;
      text-align: left;
    }
    th {
      background-color: #2563eb;
      color: white;
    }
  </style>
</head>
<body>
  <h1 style="text-align:center;">Volunteer Hours</h1>

  <table>
    <tr>
      <th>Name</th>
      <th>Hours</th>
    </tr>

    {% for v in volunteers %}
    <tr>
      <td>{{ v.first_name }} {{ v.last_name }}</td>
      <td>
        {% set hours = [] %}
        {% for a in v.availability %}
          {% set _ = hours.append(a.hour|string) %}
        {% endfor %}
        {{ hours|join(', ') if hours else "No hours" }}
      </td>
    </tr>
    {% endfor %}

  </table>
</body>
</html>
