<!DOCTYPE html>
<html>
  <head>
    <title>Volunteer Hours (Test)</title>
  </head>
  <body>
    <h1>Volunteer Hours (Test)</h1>

    <table border="1">
      <thead>
        <tr>
          <th>Volunteer</th>
          <th>First Available Hour</th>
        </tr>
      </thead>
      <tbody>
        {% for volunteer in volunteers %}
        <tr>
          <td>{{ volunteer.first_name }} {{ volunteer.last_name }}</td>
          <td>
            {% if volunteer.availability %}
              {{ volunteer.availability[0].hour }}
            {% else %}
              None
            {% endif %}
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </body>
</html>
