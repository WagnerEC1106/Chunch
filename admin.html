<!DOCTYPE html>

    <!-- TODO: Move into a .css file -->
    <style>
      * {
        box-sizing: border-box;
        font-family: 'Atkinson Hyperlegible', sans-serif;
      }
      body {
        margin: 0;
      }
      header {
        padding: 20px;
        text-align: center;
        background: #595959;
        color: white;
      }
      .navbar {
        display: flex;
        background-color: #E5E5E5;
      }
      .navbar a {
        color: #595959;
        padding: 14px 20px;
        text-decoration: none;
        text-align: center;
      }
      .navbar a:hover {
        background-color: #888;
        color: black;
      }

      .container {
        display: flex;
        flex-wrap: wrap;
        height: 100%;
      }
      .side {
        height: 100%;
        width: 10vw;
        position: absolute;
        background-color: #E3E3E3;
      }
      .side p {
        margin: 12px 0 0 0;
        border: 1px solid #A0A0A0;
        padding: 12px 24px;
        text-align: right;
      }
      .main {
        margin-left: 10vw;
        position: absolute;
        height: 100%;
        width: 87vw; 
        background-color: white;
        /* padding: 24px 0 24px 24px; */
        border: 1px dashed #AAA;
      }
      .right {
        margin-left: 97vw;
        position: fixed;
        height: 100%;
        width: 4vw;
        border: 2px dotted Tomato;
      }
      /* maintain spacing between blocks */
      .main section {
        margin: 24px 0 24px 24px;
        border: 2px dashed #595959;
      }

      #status {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-evenly;
      }
      #status div {
        padding: 2px 8px;
        border-radius: 16px;
        box-shadow: 0 0 3px 3px red;
      }

      .schedule {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        padding: 16px;
        border: 1px solid black;
      }
      .schedule div {
        display: grid;
        border: 1px solid black;
        padding: 15px;
        margin: 10px;
        text-align: center;
      }
      .schedule div table {
        margin-top: 15px;
        font-size: 12px;
      }
      /* Responsive layout - when the screen is less than 700px wide, make the two columns stack on top of each other instead of next to each other */
      @media screen and (max-width: 700px) {
        .container, .navbar {   
          flex-direction: column;
        }
      }
      /* Responsive layout - when the screen is less than 450 px wide,  */
      @media screen and (max-height: 450px) {
        .side {padding-top: 15px;}
        .side a {font-size: 18px;}
      }
    </style>
  </head>
